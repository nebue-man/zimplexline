version: '3.8'

services:
  db-v2:
    image: postgres:15-alpine
    container_name: zenon_plus_v2_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: zenon_plus_v2
    volumes:
      - pgdata-v2:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - zenon-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d zenon_plus_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-v2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zenon_plus_v2_backend
    restart: always
    expose:
      - "3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db-v2:5432/zenon_plus_v2
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://${DOMAIN}
      - NODE_ENV=production
      - ALLOW_SELF_RECORD=false
      - CLOUDINARY_URL=${CLOUDINARY_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      db-v2:
        condition: service_healthy
    networks:
      - zenon-internal

  frontend-v2:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=https://${DOMAIN}/api/v1
    container_name: zenon_plus_v2_frontend
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend-v2
    networks:
      - zenon-internal

  nginx:
    image: nginx:alpine
    container_name: zenon_plus_v2_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend-v2
      - backend-v2
    networks:
      - zenon-internal

networks:
  zenon-internal:
    driver: bridge

volumes:
  pgdata-v2: